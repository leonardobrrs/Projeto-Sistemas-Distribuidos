<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Chat — Demo Acadêmico</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3247;
    --accent: #4f8ef7;
    --accent2: #00c9a7;
    --danger: #f7616a;
    --text: #e8eaf2;
    --muted: #7a7f9a;
    --font: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 13px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .logo span { color: var(--accent2); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .status-text {
    font-size: 11px;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #rename-form {
    display: flex;
    gap: 6px;
  }

  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: var(--font);
    font-size: 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    font-family: var(--font);
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover { opacity: 0.85; color: #fff; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  #user-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  #user-list li {
    padding: 6px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #user-list li .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
  }

  #user-list li.me { color: var(--accent); }

  .stats {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-row { display: flex; justify-content: space-between; }
  .stat-val { color: var(--text); }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .msg-name {
    font-size: 11px;
    font-weight: bold;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
  }

  .msg-body {
    font-size: 13px;
    line-height: 1.5;
    padding: 8px 10px;
    background: var(--surface);
    border-radius: 0 6px 6px 6px;
    border-left: 2px solid var(--border);
    max-width: 80%;
    word-break: break-word;
  }

  .msg.mine .msg-header { flex-direction: row-reverse; }
  .msg.mine .msg-body {
    background: #1a2a4a;
    border-left: none;
    border-right: 2px solid var(--accent);
    border-radius: 6px 0 6px 6px;
    align-self: flex-end;
  }
  .msg.mine { align-items: flex-end; }
  .msg.mine .msg-name { color: var(--accent); }

  .msg-system {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .msg-system::before, .msg-system::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .msg-pong {
    font-size: 11px;
    color: var(--accent2);
    background: #0d2e26;
    border: 1px solid #1a5040;
    border-radius: 4px;
    padding: 4px 10px;
    align-self: flex-start;
  }

  .input-bar {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
  }

  #msg-input {
    flex: 1;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 6px;
  }

  #send-btn { padding: 10px 20px; font-size: 13px; }

  #ping-btn {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent2);
    border-color: var(--accent2);
  }
  #ping-btn:hover { color: var(--accent2); border-color: var(--accent2); background: #0d2e26; }

  .debug-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 20px;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
    font-family: var(--font);
  }

  .debug-item span { color: var(--accent2); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">WS<span>://</span>DEMO</div>
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">desconectado</div>
  </div>
  <div class="header-right">
    <div id="rename-form">
      <input type="text" id="rename-input" placeholder="Meu nome..." maxlength="20" style="width: 130px;">
      <button onclick="sendRename()">Renomear</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Conectados</div>
    <ul id="user-list"></ul>
    <div class="stats">
      <div class="stat-row"><span>Msgs enviadas</span><span class="stat-val" id="stat-sent">0</span></div>
      <div class="stat-row"><span>Msgs recebidas</span><span class="stat-val" id="stat-recv">0</span></div>
      <div class="stat-row"><span>Último ping</span><span class="stat-val" id="stat-ping">—</span></div>
    </div>
  </div>

  <div class="chat-area">
    <div id="messages"></div>
    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="Digite uma mensagem..." autocomplete="off">
      <button id="ping-btn" onclick="sendPing()">PING</button>
      <button id="send-btn" class="primary" onclick="sendMessage()">Enviar</button>
    </div>
  </div>
</div>

<div class="debug-panel">
  <div class="debug-item">Estado WS: <span id="dbg-state">CLOSED</span></div>
  <div class="debug-item">ReadyState: <span id="dbg-rs">3</span></div>
  <div class="debug-item">Protocolo: <span id="dbg-proto">ws://</span></div>
  <div class="debug-item">URL: <span id="dbg-url">—</span></div>
</div>

<script>
let ws = null;
let myId = null;
let myName = null;
let sentCount = 0;
let recvCount = 0;
let pingStart = 0;
const WS_URL = `ws://${location.host}`;

const stateNames = ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'];

function updateDebug() {
  if (!ws) {
    document.getElementById('dbg-state').textContent = 'CLOSED';
    document.getElementById('dbg-rs').textContent = '3';
    return;
  }
  document.getElementById('dbg-state').textContent = stateNames[ws.readyState] || '?';
  document.getElementById('dbg-rs').textContent = ws.readyState;
  document.getElementById('dbg-url').textContent = WS_URL;
}

function setStatus(connected) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (connected ? ' connected' : '');
  txt.textContent = connected ? 'conectado' : 'desconectado';
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  scrollDown();
}

function addChatMsg(data) {
  const isMe = data.id === myId;
  const div = document.createElement('div');
  div.className = 'msg' + (isMe ? ' mine' : '');
  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-name" style="color:${isMe ? 'var(--accent)' : getColor(data.id)}">${esc(data.name)}</span>
      <span class="msg-time">${data.timestamp}</span>
    </div>
    <div class="msg-body">${esc(data.message)}</div>
  `;
  document.getElementById('messages').appendChild(div);
  recvCount++;
  document.getElementById('stat-recv').textContent = recvCount;
  scrollDown();
}

function addPong(ms) {
  const div = document.createElement('div');
  div.className = 'msg-pong';
  div.textContent = `↩ PONG recebido em ${ms}ms — conexão ativa`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('stat-ping').textContent = `${ms}ms`;
  scrollDown();
}

function scrollDown() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

const colors = ['#4f8ef7','#00c9a7','#f7b731','#f77e6a','#a78bfa','#34d399','#f472b6'];
function getColor(id) { return colors[id % colors.length]; }

function updateUserList(users) {
  const ul = document.getElementById('user-list');
  ul.innerHTML = '';
  users.forEach(u => {
    const li = document.createElement('li');
    if (u.id === myId) li.className = 'me';
    li.innerHTML = `<span class="dot" style="background:${getColor(u.id)}"></span>${esc(u.name)}${u.id === myId ? ' (eu)' : ''}`;
    ul.appendChild(li);
  });
}

function connect() {
  ws = new WebSocket(WS_URL);
  document.getElementById('dbg-proto').textContent = 'ws://';
  updateDebug();

  ws.onopen = () => {
    setStatus(true);
    updateDebug();
    addSystemMsg('Conexão WebSocket estabelecida');
  };

  ws.onmessage = (event) => {
    let data;
    try { data = JSON.parse(event.data); } catch { return; }

    if (data.type === 'welcome') {
      myId = data.id;
      myName = data.name;
      addSystemMsg(data.message);
      updateUserList(data.users);
    } else if (data.type === 'chat') {
      addChatMsg(data);
    } else if (data.type === 'user_joined') {
      addSystemMsg(data.message);
      updateUserList(data.users);
    } else if (data.type === 'user_left') {
      addSystemMsg(data.message);
      updateUserList(data.users);
    } else if (data.type === 'rename') {
      if (data.id === myId) myName = data.newName;
      addSystemMsg(data.message);
      updateUserList(data.users);
    } else if (data.type === 'pong') {
      addPong(Date.now() - pingStart);
    }
    updateDebug();
  };

  ws.onclose = () => {
    setStatus(false);
    updateDebug();
    addSystemMsg('Conexão encerrada. Reconectando em 3s...');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    addSystemMsg('Erro na conexão WebSocket.');
    updateDebug();
  };
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', message: text }));
  sentCount++;
  document.getElementById('stat-sent').textContent = sentCount;
  input.value = '';
}

function sendPing() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  pingStart = Date.now();
  ws.send(JSON.stringify({ type: 'ping' }));
}

function sendRename() {
  const input = document.getElementById('rename-input');
  const name = input.value.trim();
  if (!name || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'rename', name }));
  input.value = '';
}

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
document.getElementById('rename-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendRename();
});

connect();
</script>
</body>
</html>
